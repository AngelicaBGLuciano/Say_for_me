name: say_for_me
description: "Um aplicativo de comunicação alternativa inteligente."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  permission_handler: ^12.0.1
  flutter:
    sdk: flutter

  http: ^1.2.0
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  sqflite: ^2.3.2
  path: ^1.9.0
  reorderable_grid_view: ^2.2.6
  cupertino_icons: ^1.0.2

  image_picker: ^1.0.7
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true